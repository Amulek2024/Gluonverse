services:
  backend:
    build:
      context: ./backend
    environment:
      GLUONVERSE_DATA_DIR: /app/data/simulations
      GLUONVERSE_EXPORT_DIR: /app/data/exports
      GLUONVERSE_DATABASE_URL: sqlite:////app/data/simulations/gluonverse.sqlite3
      GLUONVERSE_MAX_PARTICLES: 64
      GLUONVERSE_MAX_LATTICE_SIZE: 16
      GLUONVERSE_MAX_STEPS: 100000
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 20s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
        VITE_WS_BASE_URL: ws://localhost:8000
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_WS_BASE_URL: ws://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"


name: Deploy Gluonverse

on:
  push:
    branches: [master]

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: rg-gluonverse
  CONTAINERAPP_ENV: gluonverse-backend-env
  LOCATION: brazilsouth

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    outputs:
      backend_fqdn: ${{ steps.get-fqdn.outputs.fqdn }}
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR and fetch admin credentials
        run: |
          ACR_NAME=$(echo ${{ secrets.ACR_LOGIN_SERVER }} | cut -d'.' -f1)
          az acr login --name "$ACR_NAME"
          # Read the registry's admin credentials dynamically instead of relying on
          # ACR_USERNAME/ACR_PASSWORD secrets, which went stale and caused the container
          # apps to fail image pulls with ImagePullUnauthorized. Requires the ACR admin
          # user to be enabled.
          ACR_USER=$(az acr credential show -n "$ACR_NAME" --query username -o tsv)
          ACR_PASS=$(az acr credential show -n "$ACR_NAME" --query "passwords[0].value" -o tsv)
          echo "::add-mask::$ACR_PASS"
          echo "ACR_USER=$ACR_USER" >> "$GITHUB_ENV"
          echo "ACR_PASS=$ACR_PASS" >> "$GITHUB_ENV"

      - name: Build and push backend image
        run: |
          IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/gluonverse-backend:${{ github.sha }}
          docker build -t "$IMAGE" ./backend
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Azure Container Apps
        run: |
          az extension add --name containerapp --upgrade -y
          az containerapp up \
            -n gluonverse-backend \
            -g "$RESOURCE_GROUP" \
            --location "$LOCATION" \
            --environment "$CONTAINERAPP_ENV" \
            --image "$IMAGE" \
            --ingress external \
            --target-port 8000 \
            --registry-server "${{ secrets.ACR_LOGIN_SERVER }}" \
            --registry-username "$ACR_USER" \
            --registry-password "$ACR_PASS" \
            --env-vars GLUONVERSE_DATA_DIR=/app/data/simulations GLUONVERSE_EXPORT_DIR=/app/data/exports GLUONVERSE_DATABASE_URL=sqlite:////app/data/simulations/gluonverse.sqlite3 GLUONVERSE_MAX_PARTICLES=64 GLUONVERSE_MAX_LATTICE_SIZE=16 GLUONVERSE_MAX_STEPS=100000

      - name: Diagnose active revision
        run: |
          echo "Requested image: $IMAGE"
          echo "Active template image:"
          az containerapp show -n gluonverse-backend -g "$RESOURCE_GROUP" --query "properties.template.containers[0].image" -o tsv
          echo "Latest revision name:"
          LATEST=$(az containerapp show -n gluonverse-backend -g "$RESOURCE_GROUP" --query "properties.latestRevisionName" -o tsv)
          echo "$LATEST"
          echo "Revision list:"
          az containerapp revision list -n gluonverse-backend -g "$RESOURCE_GROUP" -o table
          echo "Recent console logs for latest revision:"
          az containerapp logs show -n gluonverse-backend -g "$RESOURCE_GROUP" --revision "$LATEST" --tail 40 || true

      - name: Ensure latest revision is activated
        run: |
          LATEST=$(az containerapp show -n gluonverse-backend -g "$RESOURCE_GROUP" --query "properties.latestRevisionName" -o tsv)
          echo "Activating: $LATEST"
          az containerapp revision activate -n gluonverse-backend -g "$RESOURCE_GROUP" --revision "$LATEST" || true

      - name: Get backend FQDN
        id: get-fqdn
        run: |
          FQDN=$(az containerapp show -n gluonverse-backend -g "$RESOURCE_GROUP" --query properties.configuration.ingress.fqdn -o tsv)
          echo "fqdn=$FQDN" >> "$GITHUB_OUTPUT"

      - name: Health check
        run: |
          FQDN=$(az containerapp show -n gluonverse-backend -g "$RESOURCE_GROUP" --query properties.configuration.ingress.fqdn -o tsv)
          for i in $(seq 1 15); do
            if curl -sf "https://$FQDN/health"; then
              echo "Backend healthy at https://$FQDN"
              exit 0
            fi
            echo "Waiting for backend health... ($i)"
            sleep 10
          done
          echo "Backend health check failed"
          exit 1

  deploy-frontend:
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR and fetch admin credentials
        run: |
          ACR_NAME=$(echo ${{ secrets.ACR_LOGIN_SERVER }} | cut -d'.' -f1)
          az acr login --name "$ACR_NAME"
          ACR_USER=$(az acr credential show -n "$ACR_NAME" --query username -o tsv)
          ACR_PASS=$(az acr credential show -n "$ACR_NAME" --query "passwords[0].value" -o tsv)
          echo "::add-mask::$ACR_PASS"
          echo "ACR_USER=$ACR_USER" >> "$GITHUB_ENV"
          echo "ACR_PASS=$ACR_PASS" >> "$GITHUB_ENV"

      - name: Build and push frontend image
        env:
          BACKEND_FQDN: ${{ needs.deploy-backend.outputs.backend_fqdn }}
        run: |
          IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/gluonverse-frontend:${{ github.sha }}
          docker build --no-cache \
            --build-arg VITE_API_BASE_URL="https://$BACKEND_FQDN" \
            --build-arg VITE_WS_BASE_URL="wss://$BACKEND_FQDN" \
            -t "$IMAGE" ./frontend
          echo "--- Asset filenames baked into this image ---"
          docker run --rm "$IMAGE" ls -la /usr/share/nginx/html/assets/
          echo "--- Grep built CSS for our current accent color (7ba7d1) ---"
          docker run --rm "$IMAGE" sh -c 'grep -c 7ba7d1 /usr/share/nginx/html/assets/*.css || echo NOT_FOUND'
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Azure Container Apps
        run: |
          az extension add --name containerapp --upgrade -y
          az containerapp up \
            -n gluonverse-frontend \
            -g "$RESOURCE_GROUP" \
            --location "$LOCATION" \
            --environment "$CONTAINERAPP_ENV" \
            --image "$IMAGE" \
            --ingress external \
            --target-port 80 \
            --registry-server "${{ secrets.ACR_LOGIN_SERVER }}" \
            --registry-username "$ACR_USER" \
            --registry-password "$ACR_PASS"

      - name: Diagnose active revision
        run: |
          echo "Requested image: $IMAGE"
          echo "Active template image:"
          az containerapp show -n gluonverse-frontend -g "$RESOURCE_GROUP" --query "properties.template.containers[0].image" -o tsv
          echo "Latest revision name:"
          LATEST=$(az containerapp show -n gluonverse-frontend -g "$RESOURCE_GROUP" --query "properties.latestRevisionName" -o tsv)
          echo "$LATEST"
          echo "Revision list:"
          az containerapp revision list -n gluonverse-frontend -g "$RESOURCE_GROUP" -o table
          echo "Recent console logs for latest revision:"
          az containerapp logs show -n gluonverse-frontend -g "$RESOURCE_GROUP" --revision "$LATEST" --tail 40 || true

      - name: Ensure latest revision is activated
        run: |
          LATEST=$(az containerapp show -n gluonverse-frontend -g "$RESOURCE_GROUP" --query "properties.latestRevisionName" -o tsv)
          echo "Activating: $LATEST"
          az containerapp revision activate -n gluonverse-frontend -g "$RESOURCE_GROUP" --revision "$LATEST" || true

      - name: Health check
        run: |
          FQDN=$(az containerapp show -n gluonverse-frontend -g "$RESOURCE_GROUP" --query properties.configuration.ingress.fqdn -o tsv)
          for i in $(seq 1 15); do
            if curl -sf "https://$FQDN/"; then
              echo "Frontend healthy at https://$FQDN"
              exit 0
            fi
            echo "Waiting for frontend health... ($i)"
            sleep 10
          done
          echo "Frontend health check failed"
          exit 1
